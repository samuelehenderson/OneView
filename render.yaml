# Render Blueprint for OneView (free tier, with a database for persistence).
# Deploy: push to GitHub, then Render → New → Blueprint, pick the repo.
#
# Persistence: the web service's own filesystem is wiped on every deploy/restart, so
# accounts, projects, and uploads are stored in PostgreSQL instead. This blueprint
# provisions a FREE Postgres database and injects its DATABASE_URL into the app.
#
# NOTE: Render's free Postgres is free for a limited time (see Render's pricing) and the
# free web service sleeps when idle (~30s cold start). For a database that stays free
# indefinitely, create one at Neon or Supabase and set DATABASE_URL to its connection
# string instead of using the `databases:` block below.
databases:
  - name: oneview-db
    plan: free

services:
  - type: web
    name: oneview
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: oneview-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.11.0"
