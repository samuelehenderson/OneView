# Render Blueprint for OneView.
# Deploy: push this repo to GitHub, then in Render → New → Blueprint, pick the repo.
#
# NOTE: the persistent disk below keeps the database + uploaded floor plans across
# deploys/restarts and requires a paid instance (Starter). If you want to try the free
# tier first, delete the `plan: starter` line and the whole `disk:` block and remove the
# DATA_DIR env var — but be aware all data + uploads are then WIPED on every deploy.
services:
  - type: web
    name: oneview
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret once and keeps it
      - key: DATA_DIR
        value: /data
      - key: NODE_VERSION
        value: "22.11.0"
    disk:
      name: oneview-data
      mountPath: /data
      sizeGB: 1
