# Render Blueprint for OneView (FREE tier).
# Deploy: push this repo to GitHub, then in Render → New → Blueprint, pick the repo.
#
# ⚠️ FREE TIER CAVEATS:
#  - No persistent disk: the database (server/data/db.json) and uploaded floor plans are
#    stored on an ephemeral filesystem and are WIPED on every deploy/restart. Accounts,
#    projects, and uploads will NOT survive a redeploy.
#  - The service sleeps after ~15 min idle and takes ~30s to wake on the next request.
#
# To make data persist later (when on a paid plan), add this back and redeploy:
#   plan: starter
#   envVars: ... - key: DATA_DIR
#                  value: /data
#   disk:
#     name: oneview-data
#     mountPath: /data
#     sizeGB: 1
services:
  - type: web
    name: oneview
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret once and keeps it
      - key: NODE_VERSION
        value: "22.11.0"
