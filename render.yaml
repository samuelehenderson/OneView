# Render Blueprint for OneView (free web service + external free Postgres).
# Deploy: push to GitHub, then Render → New → Blueprint, pick the repo.
#
# Persistence: the web service filesystem is wiped on every deploy/restart, so all data
# (accounts, projects, uploaded floor plans) lives in PostgreSQL. We use a free Neon
# database (https://neon.tech) which stays free indefinitely — set DATABASE_URL to its
# connection string in the Render dashboard (Environment tab) after the first deploy.
#
# (Render's own free Postgres works too but expires after ~30 days; Neon/Supabase don't.)
services:
  - type: web
    name: oneview
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # set manually in the dashboard to your Neon connection string
      - key: NODE_VERSION
        value: "22.11.0"
