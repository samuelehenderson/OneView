<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CFC Simulator — Siemens PXC field panel (Continuous Function Chart)</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171d26; --panel2:#1e2632; --line:#2c3644;
    --ink:#dfe6ee; --dim:#8a97a8; --accent:#4ea1ff; --num:#3b82f6; --bool:#f59e0b;
    --boolon:#f59e0b; --booloff:#5b4a25; --ok:#22c55e; --bad:#ef4444; --sel:#7dd3fc;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font:13px/1.4 "Segoe UI",system-ui,Arial,sans-serif;
    background:var(--bg); color:var(--ink); overflow:hidden;
    display:grid; grid-template-rows:auto 1fr auto; grid-template-columns:200px 1fr 270px;
    grid-template-areas:"top top top" "pal canvas insp" "stat stat stat";
  }
  header{grid-area:top; background:var(--panel); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:8px; padding:6px 10px; flex-wrap:wrap}
  header h1{font-size:13px; margin:0 12px 0 0; font-weight:600; letter-spacing:.3px}
  header h1 small{color:var(--dim); font-weight:400}
  button, select, input{font-family:inherit}
  .btn{background:var(--panel2); color:var(--ink); border:1px solid var(--line);
    padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:#143b5e; border-color:var(--accent)}
  .btn.run{background:#143b2a; border-color:var(--ok)}
  .btn.stop{background:#3b1414; border-color:var(--bad)}
  .sep{width:1px; height:22px; background:var(--line); margin:0 4px}
  label.inl{color:var(--dim); font-size:12px; display:flex; align-items:center; gap:4px}
  input.num{width:60px; background:var(--bg); color:var(--ink); border:1px solid var(--line);
    border-radius:4px; padding:3px 5px}

  #palette{grid-area:pal; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; padding:8px}
  .pal-cat{color:var(--dim); text-transform:uppercase; font-size:10px; letter-spacing:.6px;
    margin:12px 2px 4px}
  .pal-cat:first-child{margin-top:0}
  .pal-item{display:block; width:100%; text-align:left; margin:2px 0; padding:5px 8px;
    background:var(--panel2); border:1px solid var(--line); border-radius:5px; color:var(--ink);
    cursor:pointer; font-size:12px}
  .pal-item:hover{border-color:var(--accent); background:#202a38}
  .pal-item b{font-weight:600}
  .pal-item span{color:var(--dim); font-size:11px}

  #canvasWrap{grid-area:canvas; position:relative; overflow:hidden; background:
    radial-gradient(circle at 1px 1px, #1b2331 1px, transparent 0) 0 0/22px 22px, var(--bg)}
  svg{width:100%; height:100%; display:block; touch-action:none; cursor:default}
  .hint{position:absolute; left:50%; top:14px; transform:translateX(-50%);
    color:var(--dim); font-size:12px; pointer-events:none; background:rgba(15,20,25,.7);
    padding:4px 10px; border-radius:6px}

  #inspector{grid-area:insp; background:var(--panel); border-left:1px solid var(--line);
    overflow-y:auto; padding:10px}
  #inspector h2{font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--dim);
    margin:0 0 8px}
  .insp-row{display:flex; align-items:center; justify-content:space-between; gap:8px;
    margin:6px 0; font-size:12px}
  .insp-row label{color:var(--dim)}
  .insp-row input[type=text],.insp-row input[type=number],.insp-row select{
    width:120px; background:var(--bg); color:var(--ink); border:1px solid var(--line);
    border-radius:4px; padding:4px 6px}
  .insp-row input[type=range]{width:120px}
  .pinlist{margin-top:6px; border-top:1px solid var(--line); padding-top:6px}
  .pinlist .insp-row b{font-variant-numeric:tabular-nums}
  .muted{color:var(--dim); font-size:11px; margin:6px 0}
  .pill{display:inline-block; padding:1px 7px; border-radius:10px; font-size:11px;
    border:1px solid var(--line)}
  .pill.num{color:#93c5fd; border-color:#1e3a5f}
  .pill.bool{color:#fcd34d; border-color:#5b4a25}

  footer{grid-area:stat; background:var(--panel); border-top:1px solid var(--line);
    display:flex; gap:18px; align-items:center; padding:5px 12px; font-size:12px; color:var(--dim)}
  footer b{color:var(--ink); font-variant-numeric:tabular-nums}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px}
  .dot.on{background:var(--ok)} .dot.off{background:#555}

  /* in-canvas controls (foreignObject) */
  .fo-ctrl{font:11px/1 "Segoe UI",sans-serif}
  .fo-ctrl input[type=range]{width:104px}
  .fo-toggle{width:104px; padding:3px 0; border-radius:4px; cursor:pointer; border:1px solid var(--line);
    background:var(--booloff); color:#000; font-weight:600; font-size:11px}
  .fo-toggle.on{background:var(--boolon)}
</style>
</head>
<body>
<header>
  <h1>CFC Simulator <small>· Siemens PXC field panel · Continuous Function Chart</small></h1>
  <button id="runBtn" class="btn run">▶ Run</button>
  <button id="stepBtn" class="btn">⤵ Step</button>
  <button id="resetBtn" class="btn">⟲ Reset state</button>
  <span class="sep"></span>
  <label class="inl">Scan
    <input id="scanMs" class="num" type="number" min="20" max="5000" step="10" value="250"> ms</label>
  <span class="sep"></span>
  <button id="exampleBtn" class="btn primary">Load example (AHU)</button>
  <button id="saveBtn" class="btn">Save</button>
  <button id="loadBtn" class="btn">Open…</button>
  <button id="exportBtn" class="btn">Export JSON</button>
  <button id="clearBtn" class="btn">Clear</button>
  <input id="fileInput" type="file" accept="application/json" style="display:none">
</header>

<div id="palette"></div>

<div id="canvasWrap">
  <svg id="svg">
    <g id="world">
      <g id="wireLayer"></g>
      <g id="tempLayer"></g>
      <g id="blockLayer"></g>
    </g>
  </svg>
  <div class="hint" id="hint">Add blocks from the left · drag a block by its header · drag output pin → input pin to wire</div>
</div>

<div id="inspector"><h2>Inspector</h2><div class="muted">Select a block to edit its parameters and watch its live pin values.</div></div>

<footer>
  <span><span id="runDot" class="dot off"></span><b id="runState">Stopped</b></span>
  <span>Scan <b id="scanCount">0</b></span>
  <span>Cycle <b id="scanDur">0.0</b> ms</span>
  <span>Blocks <b id="blkCount">0</b></span>
  <span>Wires <b id="wireCount">0</b></span>
  <span id="msg" style="margin-left:auto"></span>
</footer>

<script>
"use strict";
/* ============================================================================
   CFC Simulator — a Continuous Function Chart engine + editor.
   Models how a Siemens PXC field panel runs CFC: blocks are evaluated every
   scan cycle, outputs are wired to downstream inputs, feedback loops resolve
   with a one-scan delay (exactly like a real controller's cyclic execution).
   ========================================================================== */

/* ---------- value helpers ---------- */
const T_NUM='num', T_BOOL='bool';
const dflt = t => t===T_BOOL ? false : 0;
const num = v => (typeof v==='number'&&isFinite(v)) ? v : 0;
const bool = v => !!v;
const clamp=(v,lo,hi)=>v<lo?lo:v>hi?hi:v;

/* ---------- block library (the CFC "block catalog") ----------
   Each def: cat, title, desc, inputs[], outputs[], params[], control?, compute()
   compute(I, P, S, dt) -> object of output values.  I=inputs, P=params,
   S=persistent per-block state, dt=scan seconds. */
const DEFS = {
  /* --- Points / IO (field panel terminal blocks) --- */
  AI:{cat:'Points',title:'AI',desc:'Analog Input — a live sensor value you drive',
    inputs:[],outputs:[{n:'O',t:T_NUM}],control:'analog',
    params:[{n:'value',label:'Value',t:'number',def:72,min:-50,max:250,step:0.5},
            {n:'units',label:'Units',t:'text',def:'°F'}],
    compute:(I,P)=>({O:num(P.value)})},
  BI:{cat:'Points',title:'BI',desc:'Binary Input — a live digital input you drive',
    inputs:[],outputs:[{n:'O',t:T_BOOL}],control:'binary',
    params:[{n:'value',label:'State',t:'bool',def:false}],
    compute:(I,P)=>({O:bool(P.value)})},
  AO:{cat:'Points',title:'AO',desc:'Analog Output — commanded value to a damper/valve',
    inputs:[{n:'I',t:T_NUM}],outputs:[],sink:'analog',
    params:[{n:'units',label:'Units',t:'text',def:'%'}],compute:()=>({})},
  BO:{cat:'Points',title:'BO',desc:'Binary Output — start/stop command (lamp)',
    inputs:[{n:'I',t:T_BOOL}],outputs:[],sink:'binary',params:[],compute:()=>({})},

  /* --- Constants --- */
  CONST:{cat:'Constants',title:'CONST',desc:'Analog constant / setpoint',
    inputs:[],outputs:[{n:'O',t:T_NUM}],control:'analog',
    params:[{n:'value',label:'Value',t:'number',def:55,min:-100,max:500,step:0.5}],
    compute:(I,P)=>({O:num(P.value)})},
  DCONST:{cat:'Constants',title:'DCONST',desc:'Digital constant (true/false)',
    inputs:[],outputs:[{n:'O',t:T_BOOL}],control:'binary',
    params:[{n:'value',label:'State',t:'bool',def:true}],compute:(I,P)=>({O:bool(P.value)})},

  /* --- Logic --- */
  AND:{cat:'Logic',title:'AND',desc:'Logical AND',
    inputs:[{n:'I1',t:T_BOOL},{n:'I2',t:T_BOOL}],outputs:[{n:'O',t:T_BOOL}],params:[],
    compute:I=>({O:bool(I.I1)&&bool(I.I2)})},
  OR:{cat:'Logic',title:'OR',desc:'Logical OR',
    inputs:[{n:'I1',t:T_BOOL},{n:'I2',t:T_BOOL}],outputs:[{n:'O',t:T_BOOL}],params:[],
    compute:I=>({O:bool(I.I1)||bool(I.I2)})},
  NOT:{cat:'Logic',title:'NOT',desc:'Invert',
    inputs:[{n:'I',t:T_BOOL}],outputs:[{n:'O',t:T_BOOL}],params:[],
    compute:I=>({O:!bool(I.I)})},
  XOR:{cat:'Logic',title:'XOR',desc:'Exclusive OR',
    inputs:[{n:'I1',t:T_BOOL},{n:'I2',t:T_BOOL}],outputs:[{n:'O',t:T_BOOL}],params:[],
    compute:I=>({O:bool(I.I1)!==bool(I.I2)})},
  RS:{cat:'Logic',title:'RS',desc:'Latch (reset-dominant): Set / Reset → Q',
    inputs:[{n:'S',t:T_BOOL},{n:'R',t:T_BOOL}],outputs:[{n:'Q',t:T_BOOL}],params:[],
    compute:(I,P,S)=>{ if(bool(I.R))S.q=false; else if(bool(I.S))S.q=true; return {Q:!!S.q}; }},

  /* --- Compare --- */
  GT:{cat:'Compare',title:'GT',desc:'Greater than  I1 > I2',
    inputs:[{n:'I1',t:T_NUM},{n:'I2',t:T_NUM}],outputs:[{n:'O',t:T_BOOL}],params:[],
    compute:I=>({O:num(I.I1)>num(I.I2)})},
  LT:{cat:'Compare',title:'LT',desc:'Less than  I1 < I2',
    inputs:[{n:'I1',t:T_NUM},{n:'I2',t:T_NUM}],outputs:[{n:'O',t:T_BOOL}],params:[],
    compute:I=>({O:num(I.I1)<num(I.I2)})},
  EQ:{cat:'Compare',title:'EQ',desc:'Equal within tolerance',
    inputs:[{n:'I1',t:T_NUM},{n:'I2',t:T_NUM}],outputs:[{n:'O',t:T_BOOL}],
    params:[{n:'tol',label:'Tolerance',t:'number',def:0.5,min:0,step:0.1}],
    compute:(I,P)=>({O:Math.abs(num(I.I1)-num(I.I2))<=num(P.tol)})},
  HYST:{cat:'Compare',title:'HYST',desc:'Hysteresis switch: ON ≥ HI, OFF ≤ LO',
    inputs:[{n:'X',t:T_NUM}],outputs:[{n:'Q',t:T_BOOL}],
    params:[{n:'hi',label:'High',t:'number',def:75},{n:'lo',label:'Low',t:'number',def:70}],
    compute:(I,P,S)=>{const x=num(I.X); if(x>=num(P.hi))S.q=true; else if(x<=num(P.lo))S.q=false; return {Q:!!S.q};}},

  /* --- Math --- */
  ADD:{cat:'Math',title:'ADD',desc:'I1 + I2',inputs:[{n:'I1',t:T_NUM},{n:'I2',t:T_NUM}],
    outputs:[{n:'O',t:T_NUM}],params:[],compute:I=>({O:num(I.I1)+num(I.I2)})},
  SUB:{cat:'Math',title:'SUB',desc:'I1 − I2',inputs:[{n:'I1',t:T_NUM},{n:'I2',t:T_NUM}],
    outputs:[{n:'O',t:T_NUM}],params:[],compute:I=>({O:num(I.I1)-num(I.I2)})},
  MUL:{cat:'Math',title:'MUL',desc:'I1 × I2',inputs:[{n:'I1',t:T_NUM},{n:'I2',t:T_NUM}],
    outputs:[{n:'O',t:T_NUM}],params:[],compute:I=>({O:num(I.I1)*num(I.I2)})},
  DIV:{cat:'Math',title:'DIV',desc:'I1 ÷ I2 (0-guarded)',inputs:[{n:'I1',t:T_NUM},{n:'I2',t:T_NUM}],
    outputs:[{n:'O',t:T_NUM}],params:[],compute:I=>({O:num(I.I2)===0?0:num(I.I1)/num(I.I2)})},
  MIN:{cat:'Math',title:'MIN',desc:'Minimum',inputs:[{n:'I1',t:T_NUM},{n:'I2',t:T_NUM}],
    outputs:[{n:'O',t:T_NUM}],params:[],compute:I=>({O:Math.min(num(I.I1),num(I.I2))})},
  MAX:{cat:'Math',title:'MAX',desc:'Maximum',inputs:[{n:'I1',t:T_NUM},{n:'I2',t:T_NUM}],
    outputs:[{n:'O',t:T_NUM}],params:[],compute:I=>({O:Math.max(num(I.I1),num(I.I2))})},
  ABS:{cat:'Math',title:'ABS',desc:'Absolute value',inputs:[{n:'X',t:T_NUM}],
    outputs:[{n:'O',t:T_NUM}],params:[],compute:I=>({O:Math.abs(num(I.X))})},

  /* --- Timers --- */
  TON:{cat:'Timers',title:'TON',desc:'On-delay: Q true after IN held PT seconds',
    inputs:[{n:'IN',t:T_BOOL}],outputs:[{n:'Q',t:T_BOOL},{n:'ET',t:T_NUM}],
    params:[{n:'PT',label:'Preset s',t:'number',def:5,min:0,step:0.5}],
    compute:(I,P,S,dt)=>{const pt=num(P.PT); if(bool(I.IN)){S.et=Math.min((S.et||0)+dt,pt);}else{S.et=0;}
      return {Q:(S.et||0)>=pt&&bool(I.IN),ET:S.et||0};}},
  TOF:{cat:'Timers',title:'TOF',desc:'Off-delay: Q stays true PT s after IN drops',
    inputs:[{n:'IN',t:T_BOOL}],outputs:[{n:'Q',t:T_BOOL},{n:'ET',t:T_NUM}],
    params:[{n:'PT',label:'Preset s',t:'number',def:5,min:0,step:0.5}],
    compute:(I,P,S,dt)=>{const pt=num(P.PT); if(bool(I.IN)){S.et=0;S.q=true;}
      else if(S.q){S.et=(S.et||0)+dt; if(S.et>=pt)S.q=false;} return {Q:!!S.q,ET:S.et||0};}},
  PULSE:{cat:'Timers',title:'PULSE',desc:'Pulse (TP): rising IN → Q true for PT s',
    inputs:[{n:'IN',t:T_BOOL}],outputs:[{n:'Q',t:T_BOOL},{n:'ET',t:T_NUM}],
    params:[{n:'PT',label:'Width s',t:'number',def:3,min:0,step:0.5}],
    compute:(I,P,S,dt)=>{const pt=num(P.PT),in_=bool(I.IN);
      if(in_&&!S.prev&&!S.q){S.q=true;S.et=0;}
      if(S.q){S.et=(S.et||0)+dt; if(S.et>=pt)S.q=false;} S.prev=in_;
      return {Q:!!S.q,ET:S.et||0};}},

  /* --- Control --- */
  PID:{cat:'Control',title:'PID',desc:'PID loop controller (anti-windup)',
    inputs:[{n:'PV',t:T_NUM},{n:'SP',t:T_NUM},{n:'EN',t:T_BOOL}],outputs:[{n:'CV',t:T_NUM}],
    params:[{n:'Kp',label:'Gain Kp',t:'number',def:4,step:0.1},
            {n:'Ti',label:'Int Ti s',t:'number',def:90,min:0,step:1},
            {n:'Td',label:'Der Td s',t:'number',def:0,min:0,step:1},
            {n:'omin',label:'Out min',t:'number',def:0},
            {n:'omax',label:'Out max',t:'number',def:100},
            {n:'act',label:'Action',t:'enum',def:'reverse',options:['reverse','direct']}],
    compute:(I,P,S,dt)=>{
      const en = ('EN' in I)? (I.EN!==false): true;
      if(!en){S.integ=0;S.prevErr=0;return {CV:num(P.omin)};}
      const err = P.act==='direct' ? num(I.PV)-num(I.SP) : num(I.SP)-num(I.PV);
      const Kp=num(P.Kp), Ti=num(P.Ti), Td=num(P.Td);
      if(Ti>0)S.integ=(S.integ||0)+err*dt;
      const deriv = dt>0 ? (err-(S.prevErr||0))/dt : 0;
      let cv = Kp*err + (Ti>0?Kp*(S.integ||0)/Ti:0) + Kp*Td*deriv;
      const lo=num(P.omin), hi=num(P.omax);
      if(cv>hi||cv<lo){ if(Ti>0)S.integ-=err*dt; cv=clamp(cv,lo,hi);} // back-calc anti-windup
      S.prevErr=err; return {CV:cv};
    }},
  RAMP:{cat:'Control',title:'RAMP',desc:'Rate-limited follow toward target',
    inputs:[{n:'TGT',t:T_NUM}],outputs:[{n:'O',t:T_NUM}],
    params:[{n:'rate',label:'Rate /s',t:'number',def:5,min:0,step:0.5},
            {n:'init',label:'Init',t:'number',def:0}],
    compute:(I,P,S,dt)=>{ if(S.v===undefined)S.v=num(P.init);
      const tgt=num(I.TGT), step=num(P.rate)*dt, d=tgt-S.v;
      S.v += Math.abs(d)<=step ? d : Math.sign(d)*step; return {O:S.v};}},
  LIMIT:{cat:'Control',title:'LIMIT',desc:'Clamp X to [LO,HI]',inputs:[{n:'X',t:T_NUM}],
    outputs:[{n:'O',t:T_NUM}],params:[{n:'lo',label:'Low',t:'number',def:0},{n:'hi',label:'High',t:'number',def:100}],
    compute:(I,P)=>({O:clamp(num(I.X),num(P.lo),num(P.hi))})},
  SEL:{cat:'Control',title:'SEL',desc:'Select: G ? I1 : I0',
    inputs:[{n:'G',t:T_BOOL},{n:'I0',t:T_NUM},{n:'I1',t:T_NUM}],outputs:[{n:'O',t:T_NUM}],params:[],
    compute:I=>({O:bool(I.G)?num(I.I1):num(I.I0)})},
};

/* ---------- geometry ---------- */
const W=132, HDR=22, ROW=20, PINR=5;
function rowsOf(def){ return Math.max(def.inputs.length, def.outputs.length, 1); }
function ctrlH(def){ return (def.control||def.sink) ? 30 : 0; }
function bodyH(def){ return rowsOf(def)*ROW + 10 + ctrlH(def); }
function blkH(def){ return HDR + bodyH(def); }
function pinY(b,idx){ return b.y + HDR + 12 + idx*ROW; }
function pinX(b,io){ return io==='in' ? b.x : b.x+W; }
function pinPos(b,io,name){
  const def=DEFS[b.type]; const arr= io==='in'?def.inputs:def.outputs;
  const idx=arr.findIndex(p=>p.n===name); return {x:pinX(b,io), y:pinY(b,idx<0?0:idx)};
}
function pinType(type,io,name){
  const def=DEFS[type]; const arr=io==='in'?def.inputs:def.outputs;
  const p=arr.find(p=>p.n===name); return p?p.t:T_NUM;
}

/* ---------- model state ---------- */
let blocks=[]; // {id,type,x,y,params,state,out:{},inVal}
let wires=[];  // {id,from,fromPin,to,toPin}
let seq=1; const uid=p=>p+(seq++);
let selBlock=null, selWire=null;
let running=false, timer=null, scanCount=0;

function makeBlock(type,x,y){
  const def=DEFS[type]; const params={};
  def.params.forEach(p=>params[p.n]=p.def);
  const out={}; def.outputs.forEach(o=>out[o.n]=dflt(o.t));
  return {id:uid('b'),type,x,y,params,state:{},out,inVal:dflt((def.inputs[0]||{}).t)};
}
function nameOf(b){ return b.name || b.type; }

/* ---------- engine: one CFC scan ---------- */
function inputValue(b,pinName){
  const w=wires.find(w=>w.to===b.id && w.toPin===pinName);
  if(w){ const src=blocks.find(x=>x.id===w.from); if(src) return src.out[w.fromPin]; }
  return dflt(pinType(b.type,'in',pinName));
}
function evalOrder(){
  // Kahn topological sort; nodes left in cycles are appended (feedback = 1-scan delay)
  const indeg=new Map(blocks.map(b=>[b.id,0]));
  const adj=new Map(blocks.map(b=>[b.id,[]]));
  wires.forEach(w=>{ if(indeg.has(w.to)&&adj.has(w.from)){ indeg.set(w.to,indeg.get(w.to)+1); adj.get(w.from).push(w.to);} });
  const q=[]; indeg.forEach((d,id)=>{ if(d===0)q.push(id); });
  const order=[], seen=new Set();
  while(q.length){ const id=q.shift(); order.push(id); seen.add(id);
    adj.get(id).forEach(n=>{ indeg.set(n,indeg.get(n)-1); if(indeg.get(n)===0)q.push(n); }); }
  blocks.forEach(b=>{ if(!seen.has(b.id))order.push(b.id); }); // cyclic remainder
  return order;
}
function scan(){
  const dt=Math.max(0.001, currentScanMs()/1000);
  const order=evalOrder();
  for(const id of order){
    const b=blocks.find(x=>x.id===id); const def=DEFS[b.type];
    const I={}; def.inputs.forEach(p=>I[p.n]=inputValue(b,p.n));
    if(def.sink){ b.inVal = I[def.inputs[0].n]; continue; }
    const res=def.compute(I,b.params,b.state,dt)||{};
    def.outputs.forEach(o=>{ if(o.n in res) b.out[o.n]=res[o.n]; });
  }
  scanCount++;
}

/* ---------- rendering ---------- */
const NS='http://www.w3.org/2000/svg';
const $=id=>document.getElementById(id);
const svg=$('svg'), world=$('world'), wireLayer=$('wireLayer'),
      blockLayer=$('blockLayer'), tempLayer=$('tempLayer');
let view={x:0,y:0,k:1};
function applyView(){ world.setAttribute('transform',`translate(${view.x},${view.y}) scale(${view.k})`); }

function el(tag,attrs,parent){ const e=document.createElementNS(NS,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]); if(parent)parent.appendChild(e); return e; }

function wirePath(x1,y1,x2,y2){ const dx=Math.max(30,Math.abs(x2-x1)*0.5);
  return `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`; }

function render(){
  buildWires(); buildBlocks(); updateLive(); updateStatus();
}
function buildWires(){
  wireLayer.innerHTML='';
  wires.forEach(w=>{
    const a=blocks.find(b=>b.id===w.from), b=blocks.find(x=>x.id===w.to);
    if(!a||!b)return;
    const p1=pinPos(a,'out',w.fromPin), p2=pinPos(b,'in',w.toPin);
    const t=pinType(a.type,'out',w.fromPin);
    const g=el('path',{id:'wire_'+w.id, d:wirePath(p1.x,p1.y,p2.x,p2.y),
      fill:'none', 'stroke-width':selWire===w.id?3.5:2.2,
      stroke:selWire===w.id?'var(--sel)':(t===T_BOOL?'#a16207':'#2563eb'),
      'data-wire':w.id, style:'cursor:pointer'}, wireLayer);
    g.addEventListener('pointerdown',ev=>{ev.stopPropagation(); selectWire(w.id);});
  });
}
function buildBlocks(){
  blockLayer.innerHTML='';
  blocks.forEach(b=>{
    const def=DEFS[b.type], h=blkH(def);
    const g=el('g',{id:'g_'+b.id, transform:`translate(0,0)`}, blockLayer);
    // body
    const sel=selBlock===b.id;
    el('rect',{x:b.x,y:b.y,width:W,height:h,rx:7,fill:'var(--panel2)',
      stroke:sel?'var(--sel)':'var(--line)','stroke-width':sel?2:1.2}, g);
    // header (drag handle)
    const hdr=el('rect',{x:b.x,y:b.y,width:W,height:HDR,rx:7,
      fill:def.sink?'#2a2030':def.control?'#1d2b22':'#202a38',
      stroke:'none', style:'cursor:move'}, g);
    el('rect',{x:b.x,y:b.y+HDR-7,width:W,height:7,fill:def.sink?'#2a2030':def.control?'#1d2b22':'#202a38'},g);
    const title=el('text',{x:b.x+8,y:b.y+15,fill:'var(--ink)','font-size':12,'font-weight':600,style:'cursor:move'},g);
    title.textContent=def.title + (b.name?(' · '+b.name):'');
    hdr.addEventListener('pointerdown',ev=>startDrag(ev,b));
    title.addEventListener('pointerdown',ev=>startDrag(ev,b));
    g.addEventListener('pointerdown',ev=>{ if(ev.target===g||ev.target.tagName==='rect') selectBlock(b.id); });

    // input pins
    def.inputs.forEach((p,i)=>{
      const y=pinY(b,i);
      drawPin(g,b,'in',p,b.x,y);
      const tx=el('text',{x:b.x+12,y:y+4,fill:'var(--dim)','font-size':11},g); tx.textContent=p.n;
    });
    // output pins + live value
    def.outputs.forEach((p,i)=>{
      const y=pinY(b,i);
      drawPin(g,b,'out',p,b.x+W,y);
      const tx=el('text',{x:b.x+W-12,y:y+4,fill:'var(--dim)','font-size':11,'text-anchor':'end'},g);
      tx.textContent=p.n;
      const vx=el('text',{id:'ov_'+b.id+'_'+p.n, x:b.x+W-12,y:y+4,
        fill:p.t===T_BOOL?'#fcd34d':'#93c5fd','font-size':11,'text-anchor':'end','font-weight':600,
        style:'display:none'},g); // value shown when no name collision space; we show in body instead
      vx.textContent='';
    });
    // body readout (value) for sources/sinks/compute
    drawReadout(g,b);
    // inline control for source blocks
    if(def.control) drawControl(g,b,h);
  });
}
function drawPin(g,b,io,p,x,y){
  const c=el('circle',{id:'pin_'+b.id+'_'+io+'_'+p.n, cx:x,cy:y,r:PINR,
    fill: p.t===T_BOOL?'#5b4a25':'#1e3a5f', stroke:p.t===T_BOOL?'#f59e0b':'#3b82f6',
    'stroke-width':1.5, style:'cursor:crosshair'},g);
  c.addEventListener('pointerdown',ev=>{ev.stopPropagation();
    if(io==='out') startWire(ev,b,p); });
  c.addEventListener('pointerup',ev=>{ if(io==='in') completeWire(ev,b,p); });
  // larger invisible hit area
  const hit=el('circle',{cx:x,cy:y,r:10,fill:'transparent',style:'cursor:crosshair'},g);
  hit.addEventListener('pointerdown',ev=>{ev.stopPropagation(); if(io==='out') startWire(ev,b,p);});
  hit.addEventListener('pointerup',ev=>{ if(io==='in') completeWire(ev,b,p); });
}
function readoutText(b){
  const def=DEFS[b.type];
  if(def.sink) return fmt(b.inVal, def.inputs[0].t, b.params.units);
  if(def.outputs.length){ const o=def.outputs[0]; return fmt(b.out[o.n], o.t, b.params.units); }
  return '';
}
function drawReadout(g,b){
  const def=DEFS[b.type]; if(!def.sink && def.control) return; // sources show value in control
  const h=blkH(def);
  const t=el('text',{id:'rd_'+b.id, x:b.x+W/2, y:b.y+h-9, 'text-anchor':'middle',
    'font-size':13,'font-weight':700, fill:'var(--ink)'},g);
  t.textContent=readoutText(b);
}
function fmt(v,t,units){
  if(t===T_BOOL) return v?'TRUE':'FALSE';
  const n=num(v); const s=Math.abs(n)>=100?n.toFixed(0):n.toFixed(1);
  return s+(units?(' '+units):'');
}
function drawControl(g,b,h){
  const def=DEFS[b.type]; const y=b.y+h-26, fo=el('foreignObject',{x:b.x+12,y:y,width:W-24,height:24},g);
  const div=document.createElement('div'); div.className='fo-ctrl'; fo.appendChild(div);
  div.addEventListener('pointerdown',ev=>ev.stopPropagation());
  if(def.control==='analog'){
    const pdef=def.params.find(p=>p.n==='value');
    const wrap=document.createElement('div'); wrap.style.display='flex'; wrap.style.alignItems='center'; wrap.style.gap='6px';
    const r=document.createElement('input'); r.type='range';
    r.min=pdef.min??0; r.max=pdef.max??100; r.step=pdef.step??1; r.value=b.params.value;
    const lab=document.createElement('span'); lab.style.minWidth='42px'; lab.style.textAlign='right';
    lab.style.fontWeight='700'; lab.textContent=fmt(b.params.value,T_NUM,b.params.units);
    r.addEventListener('input',()=>{ b.params.value=parseFloat(r.value);
      lab.textContent=fmt(b.params.value,T_NUM,b.params.units); if(selBlock===b.id)renderInspector(); autosave(); });
    wrap.appendChild(r); wrap.appendChild(lab); div.appendChild(wrap);
  } else {
    const btn=document.createElement('button'); btn.className='fo-toggle'+(b.params.value?' on':'');
    btn.textContent=b.params.value?'TRUE':'FALSE';
    btn.addEventListener('click',()=>{ b.params.value=!b.params.value;
      btn.className='fo-toggle'+(b.params.value?' on':''); btn.textContent=b.params.value?'TRUE':'FALSE';
      if(selBlock===b.id)renderInspector(); autosave(); });
    div.appendChild(btn);
  }
}

/* lightweight per-scan refresh (no rebuild → keeps slider focus) */
function updateLive(){
  blocks.forEach(b=>{
    const def=DEFS[b.type];
    const rd=$('rd_'+b.id); if(rd) rd.textContent=readoutText(b);
    // pin fill reflects boolean state
    def.outputs.forEach(p=>{ if(p.t===T_BOOL){ const c=$('pin_'+b.id+'_out_'+p.n);
      if(c){ const on=bool(b.out[p.n]); c.setAttribute('fill',on?'#f59e0b':'#5b4a25'); } } });
    def.inputs.forEach(p=>{ if(p.t===T_BOOL){ const c=$('pin_'+b.id+'_in_'+p.n);
      if(c){ const on=bool(inputValue(b,p.n)); c.setAttribute('fill',on?'#f59e0b':'#5b4a25'); } } });
    // BO lamp colour via readout already; tint body of binary sink
  });
  // wire colour pulses for live booleans
  wires.forEach(w=>{ const a=blocks.find(b=>b.id===w.from); if(!a)return;
    const t=pinType(a.type,'out',w.fromPin); const path=$('wire_'+w.id); if(!path||selWire===w.id)return;
    if(t===T_BOOL){ const on=bool(a.out[w.fromPin]); path.setAttribute('stroke',on?'#f59e0b':'#5b4732'); }
  });
}

/* ---------- interaction: drag blocks ---------- */
let drag=null;
function startDrag(ev,b){ ev.stopPropagation(); selectBlock(b.id);
  const p=toWorld(ev); drag={b, dx:p.x-b.x, dy:p.y-b.y}; svg.setPointerCapture(ev.pointerId); }
function onMove(ev){
  const p=toWorld(ev);
  if(drag){ drag.b.x=p.x-drag.dx; drag.b.y=p.y-drag.dy; moveBlockDom(drag.b); return; }
  if(pending){ const a=blocks.find(b=>b.id===pending.from);
    const pp=pinPos(a,'out',pending.fromPin); tempLayer.innerHTML='';
    el('path',{d:wirePath(pp.x,pp.y,p.x,p.y),fill:'none',stroke:'var(--sel)','stroke-width':2,'stroke-dasharray':'4 3'},tempLayer); return; }
  if(pan){ view.x=pan.vx+(ev.clientX-pan.sx); view.y=pan.vy+(ev.clientY-pan.sy); applyView(); }
}
function moveBlockDom(b){ // rebuild just this block's group + its wires
  buildBlocks(); buildWires(); updateLive();
}
function onUp(ev){
  if(drag){ drag=null; autosave(); }
  if(pending){ pending=null; tempLayer.innerHTML=''; }
  pan=null;
}

/* ---------- interaction: wiring ---------- */
let pending=null;
function startWire(ev,b,p){ pending={from:b.id, fromPin:p.n, t:p.t}; }
// NOTE: do NOT setPointerCapture here — capturing to <svg> would steal the
// pointerup from the destination input pin and the wire would never complete.
function completeWire(ev,b,p){
  if(!pending) return; ev.stopPropagation();
  if(pending.t!==p.t){ flash('Type mismatch: '+pending.t+' → '+p.t); pending=null; tempLayer.innerHTML=''; return; }
  if(pending.from===b.id){ pending=null; tempLayer.innerHTML=''; return; }
  wires=wires.filter(w=>!(w.to===b.id && w.toPin===p.n)); // one source per input
  wires.push({id:uid('w'),from:pending.from,fromPin:pending.fromPin,to:b.id,toPin:p.n});
  pending=null; tempLayer.innerHTML=''; render(); autosave();
}

/* ---------- selection ---------- */
function selectBlock(id){ selBlock=id; selWire=null; buildBlocks(); buildWires(); renderInspector(); }
function selectWire(id){ selWire=id; selBlock=null; buildWires(); buildBlocks(); renderInspector(); }
function clearSel(){ selBlock=null; selWire=null; buildBlocks(); buildWires(); renderInspector(); }

/* ---------- inspector ---------- */
function renderInspector(){
  const ins=$('inspector');
  if(selWire){ const w=wires.find(x=>x.id===selWire);
    ins.innerHTML='<h2>Wire</h2>'+(w?`<div class="muted">${w.from}.${w.fromPin} → ${w.to}.${w.toPin}</div>
      <button class="btn stop" onclick="deleteWire('${w.id}')">Delete wire</button>`:'');
    return; }
  if(!selBlock){ ins.innerHTML='<h2>Inspector</h2><div class="muted">Select a block to edit its parameters and watch its live pin values.</div>'; return; }
  const b=blocks.find(x=>x.id===selBlock); if(!b){ selBlock=null; return; }
  const def=DEFS[b.type];
  let html=`<h2>${def.title} block</h2><div class="muted">${def.desc}</div>`;
  html+=`<div class="insp-row"><label>Name</label><input type="text" value="${b.name||''}" placeholder="(optional)" oninput="setName('${b.id}',this.value)"></div>`;
  if(def.params.length){ html+='<div class="pinlist"><div class="muted">Parameters</div>';
    def.params.forEach(p=>{
      const v=b.params[p.n];
      if(p.t==='bool'){ html+=`<div class="insp-row"><label>${p.label}</label>
        <input type="checkbox" ${v?'checked':''} onchange="setParam('${b.id}','${p.n}',this.checked)"></div>`; }
      else if(p.t==='enum'){ html+=`<div class="insp-row"><label>${p.label}</label><select onchange="setParam('${b.id}','${p.n}',this.value)">`+
        p.options.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')+`</select></div>`; }
      else if(p.t==='text'){ html+=`<div class="insp-row"><label>${p.label}</label>
        <input type="text" value="${v}" oninput="setParam('${b.id}','${p.n}',this.value)"></div>`; }
      else { html+=`<div class="insp-row"><label>${p.label}</label>
        <input type="number" value="${v}" step="${p.step||1}" oninput="setParam('${b.id}','${p.n}',parseFloat(this.value))"></div>`; }
    });
    html+='</div>'; }
  // live pins
  html+='<div class="pinlist"><div class="muted">Live values</div>';
  def.inputs.forEach(p=>{ html+=`<div class="insp-row"><label><span class="pill ${p.t}">${p.n}</span></label>
    <b id="li_${b.id}_${p.n}">${fmt(inputValue(b,p.n),p.t)}</b></div>`; });
  def.outputs.forEach(p=>{ html+=`<div class="insp-row"><label><span class="pill ${p.t}">${p.n}</span></label>
    <b id="lo_${b.id}_${p.n}">${fmt(b.out[p.n],p.t)}</b></div>`; });
  if(def.sink) html+=`<div class="insp-row"><label>input</label><b>${fmt(b.inVal,def.inputs[0].t,b.params.units)}</b></div>`;
  html+='</div>';
  html+=`<div style="margin-top:10px"><button class="btn stop" onclick="deleteBlock('${b.id}')">Delete block</button></div>`;
  ins.innerHTML=html;
}
function refreshInspectorLive(){
  if(!selBlock) return; const b=blocks.find(x=>x.id===selBlock); if(!b) return; const def=DEFS[b.type];
  def.inputs.forEach(p=>{ const e=$('li_'+b.id+'_'+p.n); if(e)e.textContent=fmt(inputValue(b,p.n),p.t); });
  def.outputs.forEach(p=>{ const e=$('lo_'+b.id+'_'+p.n); if(e)e.textContent=fmt(b.out[p.n],p.t); });
}
window.setParam=(id,n,v)=>{ const b=blocks.find(x=>x.id===id); if(!b)return; b.params[n]=v; buildBlocks(); buildWires(); autosave(); };
window.setName=(id,v)=>{ const b=blocks.find(x=>x.id===id); if(!b)return; b.name=v; buildBlocks(); autosave(); };
window.deleteBlock=id=>{ blocks=blocks.filter(b=>b.id!==id); wires=wires.filter(w=>w.from!==id&&w.to!==id);
  if(selBlock===id)selBlock=null; render(); renderInspector(); autosave(); };
window.deleteWire=id=>{ wires=wires.filter(w=>w.id!==id); if(selWire===id)selWire=null; render(); renderInspector(); autosave(); };

/* ---------- coordinate transforms ---------- */
function toWorld(ev){ const r=svg.getBoundingClientRect();
  return {x:(ev.clientX-r.left-view.x)/view.k, y:(ev.clientY-r.top-view.y)/view.k}; }

/* ---------- canvas pan / zoom ---------- */
let pan=null;
svg.addEventListener('pointerdown',ev=>{ if(ev.target===svg||ev.target===world||ev.target.id==='wireLayer'){
  clearSel(); pan={sx:ev.clientX,sy:ev.clientY,vx:view.x,vy:view.y}; } });
svg.addEventListener('pointermove',onMove);
window.addEventListener('pointerup',onUp);
svg.addEventListener('wheel',ev=>{ ev.preventDefault();
  const r=svg.getBoundingClientRect(); const mx=ev.clientX-r.left, my=ev.clientY-r.top;
  const k2=clamp(view.k*(ev.deltaY<0?1.1:0.9),0.35,2.5);
  view.x = mx-(mx-view.x)*(k2/view.k); view.y = my-(my-view.y)*(k2/view.k); view.k=k2; applyView();
},{passive:false});

/* ---------- palette ---------- */
function buildPalette(){
  const cats={}; Object.entries(DEFS).forEach(([k,d])=>{ (cats[d.cat]=cats[d.cat]||[]).push([k,d]); });
  const pal=$('palette'); pal.innerHTML='';
  Object.entries(cats).forEach(([cat,items])=>{
    const h=document.createElement('div'); h.className='pal-cat'; h.textContent=cat; pal.appendChild(h);
    items.forEach(([k,d])=>{ const b=document.createElement('button'); b.className='pal-item';
      b.innerHTML=`<b>${d.title}</b> &nbsp;<span>${d.desc.split('—')[0].split('(')[0].trim().slice(0,22)}</span>`;
      b.title=d.desc; b.onclick=()=>addBlock(k); pal.appendChild(b); });
  });
}
function addBlock(type){
  const r=svg.getBoundingClientRect();
  const cx=(r.width/2-view.x)/view.k-W/2, cy=(r.height/2-view.y)/view.k-30;
  const b=makeBlock(type, Math.round((cx+ (Math.random()*40-20))/10)*10, Math.round((cy+(Math.random()*40-20))/10)*10);
  blocks.push(b); selectBlock(b.id); render(); autosave(); $('hint').style.display='none';
}

/* ---------- run loop ---------- */
function currentScanMs(){ return clamp(parseInt($('scanMs').value)||250,20,5000); }
function tick(){ const t0=performance.now(); scan(); const dur=performance.now()-t0;
  updateLive(); refreshInspectorLive(); $('scanDur').textContent=dur.toFixed(2); updateStatus(); }
function setRunning(on){ running=on;
  $('runBtn').textContent=on?'⏸ Pause':'▶ Run'; $('runBtn').className='btn '+(on?'stop':'run');
  $('runDot').className='dot '+(on?'on':'off'); $('runState').textContent=on?'Running':'Stopped';
  if(timer){clearInterval(timer);timer=null;} if(on) timer=setInterval(tick,currentScanMs());
}
$('runBtn').onclick=()=>setRunning(!running);
$('stepBtn').onclick=()=>{ if(running)setRunning(false); tick(); };
$('resetBtn').onclick=()=>{ blocks.forEach(b=>{b.state={}; const def=DEFS[b.type];
  def.outputs.forEach(o=>b.out[o.n]=dflt(o.t)); b.inVal=dflt((def.inputs[0]||{}).t);}); scanCount=0; render(); flash('State reset'); };
$('scanMs').onchange=()=>{ if(running)setRunning(true); }; // restart interval at new rate

/* ---------- status ---------- */
function updateStatus(){ $('scanCount').textContent=scanCount;
  $('blkCount').textContent=blocks.length; $('wireCount').textContent=wires.length; }
function flash(m){ const e=$('msg'); e.textContent=m; e.style.color='var(--accent)';
  setTimeout(()=>{ if(e.textContent===m)e.textContent=''; },2500); }

/* ---------- persistence ---------- */
function serialize(){ return {v:1, seq, view,
  blocks:blocks.map(b=>({id:b.id,type:b.type,x:b.x,y:b.y,name:b.name||'',params:b.params})),
  wires:wires.map(w=>({id:w.id,from:w.from,fromPin:w.fromPin,to:w.to,toPin:w.toPin}))}; }
function deserialize(d){
  if(!d||!d.blocks)return false;
  blocks=d.blocks.map(s=>{ const b=makeBlock(s.type,s.x,s.y); b.id=s.id; b.name=s.name;
    Object.assign(b.params,s.params||{}); return b; });
  wires=(d.wires||[]).map(w=>({...w}));
  seq=d.seq||seq; view=d.view||view; applyView();
  selBlock=selWire=null; scanCount=0; render(); renderInspector(); return true;
}
function autosave(){ try{ localStorage.setItem('cfc-sim', JSON.stringify(serialize())); }catch(e){} }
$('saveBtn').onclick=()=>{ autosave(); flash('Saved to browser'); };
$('clearBtn').onclick=()=>{ if(confirm('Clear the whole chart?')){ blocks=[]; wires=[]; render(); renderInspector(); autosave(); } };
$('exportBtn').onclick=()=>{ const blob=new Blob([JSON.stringify(serialize(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='cfc-chart.json'; a.click(); };
$('loadBtn').onclick=()=>$('fileInput').click();
$('fileInput').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const rd=new FileReader();
  rd.onload=()=>{ try{ deserialize(JSON.parse(rd.result)); flash('Loaded '+f.name); }catch(err){ flash('Bad file'); } };
  rd.readAsText(f); e.target.value=''; };

/* ---------- keyboard ---------- */
window.addEventListener('keydown',ev=>{
  if(ev.target.tagName==='INPUT'||ev.target.tagName==='SELECT')return;
  if(ev.key==='Delete'||ev.key==='Backspace'){ if(selBlock)deleteBlock(selBlock); else if(selWire)deleteWire(selWire); }
  if(ev.key===' '){ ev.preventDefault(); setRunning(!running); }
});

/* ---------- example: AHU supply-air temperature control ----------
   PPCL would have been a few lines:  $SAT = INPUT ...; PID(...); etc.
   In CFC the same control is a wired chart of blocks. */
function loadExample(){
  blocks=[]; wires=[]; seq=1; view={x:40,y:20,k:1}; applyView();
  const B={};
  const add=(key,type,x,y,params,name)=>{ const b=makeBlock(type,x,y); if(params)Object.assign(b.params,params);
    if(name)b.name=name; blocks.push(b); B[key]=b; return b; };
  add('sat','AI',40,60,{value:62,units:'°F'},'SAT');          // supply-air temp sensor
  add('sp','CONST',40,180,{value:55},'SP 55°F');               // supply-air setpoint
  add('occ','BI',40,300,{value:true},'Occupied');              // occupancy
  add('pid','PID',320,90,{Kp:6,Ti:120,Td:0,omin:0,omax:100,act:'direct'},'SAT loop'); // cooling: valve opens as SAT rises
  add('sel','SEL',560,150,null,'Occ select');                 // 0% when unoccupied
  add('off','CONST',320,300,{value:0},'Unocc 0%');
  add('clg','AO',800,150,{units:'%'},'Cooling valve');
  add('hi','HYST',320,420,{hi:60,lo:56},'Hi-temp alarm');
  add('alm','BO',560,420,null,'High SAT alarm');
  const wire=(a,ap,b,bp)=>wires.push({id:uid('w'),from:B[a].id,fromPin:ap,to:B[b].id,toPin:bp});
  wire('sat','O','pid','PV'); wire('sp','O','pid','SP'); wire('occ','O','pid','EN');
  wire('occ','O','sel','G'); wire('off','O','sel','I0'); wire('pid','CV','sel','I1');
  wire('sel','O','clg','I');
  wire('sat','O','hi','X'); wire('hi','Q','alm','I');
  selBlock=selWire=null; scanCount=0; render(); renderInspector(); $('hint').style.display='none';
  flash('Loaded AHU example — press Run, then drag the SAT slider up/down');
}
$('exampleBtn').onclick=loadExample;

/* ---------- boot ---------- */
buildPalette(); applyView();
(function init(){ try{ const raw=localStorage.getItem('cfc-sim');
  if(raw && deserialize(JSON.parse(raw)) && blocks.length){ flash('Restored your chart'); return; } }catch(e){}
  loadExample();
})();
</script>
</body>
</html>
